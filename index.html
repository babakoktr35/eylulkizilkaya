<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürpriz Sayfa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            text-align: center;
        }
        #imageContainer img {
            max-width: 90%;
            max-height: 400px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 10px;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
        #ytIframe { display: none; }
    </style>
</head>
<body>

    <div id="imageContainer">
        <img id="displayImage" src="https://picsum.photos/400/400" alt="Görsel">
    </div>

    <button id="actionBtn" onclick="baslat()">Görseli Değiştir ve Müziği Çal</button>

    <div id="ytIframe"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let isStarted = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytIframe', {
                height: '0',
                width: '0',
                videoId: 'yd9e3Lqf2Eg', // Senin şarkın
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'loop': 1,
                    'playlist': 'yd9e3Lqf2Eg'
                }
            });
        }

        function baslat() {
            // Görseli değiştir
            document.getElementById('displayImage').src = "https://picsum.photos/400/400?random=" + Math.random();
            
            // Müziği başlat (Kullanıcı tıkladığı için tarayıcı izin verecek)
            if (player && player.playVideo) {
                player.playVideo();
                player.unMute();
            }
            
            document.getElementById('actionBtn').textContent = "Başka Bir Görsel!";
        }
    </script>
</body>
</html>
