<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  .wrap { background: linear-gradient(135deg,#ffe0ec,#fce4f3,#f5d0f0); padding:36px 20px; font-family:'Lato',sans-serif; }
  .card { background:rgba(255,255,255,0.88); backdrop-filter:blur(12px); border-radius:24px; border:1.5px solid rgba(255,120,170,0.3); padding:28px 24px; max-width:540px; margin:0 auto 20px; }
  .slabel { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:#e91e8c; margin-bottom:8px; display:block; }
  input[type=text], textarea { width:100%; background:rgba(255,240,248,0.7); border:1px solid rgba(233,30,140,0.2); border-radius:14px; padding:12px 16px; font-family:'Lato',sans-serif; font-size:14px; color:#880e4f; outline:none; transition:.2s; resize:none; margin-bottom:16px; }
  input:focus, textarea:focus { border-color:#e91e8c; background:#fff0f8; }
  input::placeholder, textarea::placeholder { color:rgba(194,24,91,0.35); }
  .theme-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:20px; }
  .tbtn { padding:10px 6px; border-radius:12px; border:1.5px solid rgba(233,30,140,0.2); background:rgba(255,240,248,0.5); cursor:pointer; text-align:center; font-size:12px; color:#c2185b; font-family:'Lato',sans-serif; transition:.2s; }
  .tbtn .em { font-size:18px; display:block; margin-bottom:3px; }
  .tbtn:hover,.tbtn.active { background:#e91e8c; border-color:#e91e8c; color:#fff; }
  .go-btn { width:100%; padding:16px; background:linear-gradient(135deg,#e91e8c,#c2185b); border:none; border-radius:16px; color:#fff; font-family:'Playfair Display',serif; font-size:17px; font-style:italic; cursor:pointer; letter-spacing:.5px; }
  .go-btn:hover { opacity:.9; }
  #dlBtn { display:none; width:100%; padding:16px; background:linear-gradient(135deg,#4caf50,#2e7d32); border:none; border-radius:16px; color:#fff; font-family:'Lato',sans-serif; font-size:15px; cursor:pointer; margin-top:12px; letter-spacing:.3px; }
  #dlBtn:hover { opacity:.9; }
  #canvasWrap { display:none; margin-top:16px; border-radius:16px; overflow:hidden; border:1.5px solid rgba(233,30,140,0.25); }
  #canvasWrap canvas { width:100%; display:block; }

  /* Müzik Çubuğu */
  #musicBar {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    border: 1.5px solid rgba(233,30,140,0.3);
    border-radius: 50px;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    color: #c2185b;
    box-shadow: 0 4px 20px rgba(233,30,140,0.15);
    z-index: 9999;
    cursor: pointer;
    transition: all .2s;
  }
  #musicBar:hover { box-shadow: 0 6px 24px rgba(233,30,140,0.25); transform: translateY(-1px); }
  #musicBar .music-icon { font-size: 18px; }
  #musicBar .music-label { font-weight: 400; letter-spacing: .3px; }
  #musicBar .music-waves {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 16px;
  }
  #musicBar .music-waves span {
    display: block;
    width: 3px;
    background: #e91e8c;
    border-radius: 2px;
    animation: wave 1s ease-in-out infinite;
  }
  #musicBar .music-waves span:nth-child(1) { height: 6px;  animation-delay: 0s; }
  #musicBar .music-waves span:nth-child(2) { height: 12px; animation-delay: .15s; }
  #musicBar .music-waves span:nth-child(3) { height: 8px;  animation-delay: .3s; }
  #musicBar .music-waves span:nth-child(4) { height: 14px; animation-delay: .1s; }
  #musicBar .music-waves span:nth-child(5) { height: 5px;  animation-delay: .25s; }
  #musicBar.paused .music-waves span { animation-play-state: paused; }

  @keyframes wave {
    0%, 100% { transform: scaleY(1); }
    50%       { transform: scaleY(2); }
  }
</style>

<!-- Arka plan müziği -->
<audio id="bgMusic" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Müzik kontrol çubuğu -->
<div id="musicBar" onclick="toggleMusic()">
  <span class="music-icon">♫</span>
  <span class="music-label" id="musicLabel">Müzik</span>
  <div class="music-waves">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
</div>

<div class="wrap">
  <div style="text-align:center;margin-bottom:28px;">
    <div style="font-size:28px;margin-bottom:6px;">💌 ♡ 💕</div>
    <div style="font-family:'Playfair Display',serif;font-size:26px;color:#c2185b;font-weight:700;">Ona Mesaj Gönder</div>
    <div style="font-size:13px;color:#e91e8c;opacity:.7;margin-top:4px;font-weight:300;">Mesajını JPG olarak indir, paylaş!</div>
  </div>

  <div class="card">
    <span class="slabel">Kime?</span>
    <input type="text" id="toName" placeholder="Kız arkadaşının adı..." />

    <span class="slabel">Kimden?</span>
    <input type="text" id="fromName" placeholder="Senin adın..." />

    <span class="slabel">Mesajın</span>
    <textarea id="message" rows="4" placeholder="Kalbinden gelenler... 🌸"></textarea>

    <span class="slabel">Tema</span>
    <div class="theme-grid">
      <button class="tbtn active" onclick="selTheme(this,'romantic')"><span class="em">💕</span>Romantik</button>
      <button class="tbtn" onclick="selTheme(this,'sweet')"><span class="em">🌸</span>Tatlı</button>
      <button class="tbtn" onclick="selTheme(this,'magic')"><span class="em">✨</span>Büyülü</button>
      <button class="tbtn" onclick="selTheme(this,'deep')"><span class="em">🌙</span>Derin</button>
      <button class="tbtn" onclick="selTheme(this,'light')"><span class="em">🦋</span>Hafif</button>
      <button class="tbtn" onclick="selTheme(this,'fire')"><span class="em">🔥</span>Ateşli</button>
    </div>

    <button class="go-btn" onclick="generate()">Görsel Oluştur ♡</button>
    <div id="canvasWrap"><canvas id="msgCanvas"></canvas></div>
    <button id="dlBtn" onclick="download()">⬇ JPG Olarak İndir</button>
  </div>
</div>

<script>
let theme = 'romantic';
let musicPlaying = false;
const audio = document.getElementById('bgMusic');
const musicBar = document.getElementById('musicBar');
const musicLabel = document.getElementById('musicLabel');

// Sayfa yüklenince otomatik çalmayı dene
window.addEventListener('load', () => {
  audio.volume = 0.5;
  const playPromise = audio.play();
  if (playPromise !== undefined) {
    playPromise.then(() => {
      musicPlaying = true;
      musicLabel.textContent = 'Duraklat';
    }).catch(() => {
      // Tarayıcı autoplay'i engelledi — kullanıcı etkileşimi bekleniyor
      musicPlaying = false;
      musicLabel.textContent = 'Müziği Çal';
      musicBar.classList.add('paused');
    });
  }
});

// Kullanıcı sayfaya ilk kez dokunduğunda/tıkladığında müziği başlat
function startMusicOnInteraction() {
  if (!musicPlaying) {
    audio.play().then(() => {
      musicPlaying = true;
      musicLabel.textContent = 'Duraklat';
      musicBar.classList.remove('paused');
    }).catch(() => {});
  }
  document.removeEventListener('click', startMusicOnInteraction);
  document.removeEventListener('touchstart', startMusicOnInteraction);
  document.removeEventListener('keydown', startMusicOnInteraction);
}
document.addEventListener('click', startMusicOnInteraction);
document.addEventListener('touchstart', startMusicOnInteraction);
document.addEventListener('keydown', startMusicOnInteraction);

function toggleMusic() {
  if (musicPlaying) {
    audio.pause();
    musicPlaying = false;
    musicLabel.textContent = 'Müziği Çal';
    musicBar.classList.add('paused');
  } else {
    audio.play().then(() => {
      musicPlaying = true;
      musicLabel.textContent = 'Duraklat';
      musicBar.classList.remove('paused');
    });
  }
}

const themes = {
  romantic: { bg1:'#ffe0ec', bg2:'#ffc2d4', accent:'#e91e8c', text:'#880e4f', sub:'#c2185b', emoji:'💕', hearts:['♥','♡','💕','💗'] },
  sweet:    { bg1:'#fff0f5', bg2:'#ffd6e8', accent:'#f06292', text:'#880e4f', sub:'#ad1457', emoji:'🌸', hearts:['🌸','✿','❀','♡'] },
  magic:    { bg1:'#f3e5f5', bg2:'#e1bee7', accent:'#9c27b0', text:'#4a148c', sub:'#7b1fa2', emoji:'✨', hearts:['✦','✧','★','✨'] },
  deep:     { bg1:'#1a1a2e', bg2:'#16213e', accent:'#e91e8c', text:'#f8bbd0', sub:'#f48fb1', emoji:'🌙', hearts:['☽','★','✦','♡'] },
  light:    { bg1:'#e3f2fd', bg2:'#bbdefb', accent:'#1976d2', text:'#0d47a1', sub:'#1565c0', emoji:'🦋', hearts:['❋','✿','❀','♡'] },
  fire:     { bg1:'#fff3e0', bg2:'#ffe0b2', accent:'#e64a19', text:'#bf360c', sub:'#d84315', emoji:'🔥', hearts:['❤','♥','✦','★'] }
};

function selTheme(btn, t) {
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  theme = t;
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let lines = [];
  for (let w of words) {
    const test = line + w + ' ';
    if (ctx.measureText(test).width > maxW && line !== '') {
      lines.push(line.trim());
      line = w + ' ';
    } else { line = test; }
  }
  if (line.trim()) lines.push(line.trim());
  lines.forEach((l,i) => ctx.fillText(l, x, y + i * lineH));
  return lines.length;
}

function generate() {
  const to = document.getElementById('toName').value.trim();
  const from = document.getElementById('fromName').value.trim();
  const msg = document.getElementById('message').value.trim();
  if (!to || !msg) {
    const el = !to ? document.getElementById('toName') : document.getElementById('message');
    el.style.borderColor='#e91e8c'; el.focus();
    setTimeout(()=>el.style.borderColor='',2000);
    return;
  }

  const t = themes[theme];
  const W = 800, H = 600;
  const canvas = document.getElementById('msgCanvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const grad = ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0, t.bg1);
  grad.addColorStop(1, t.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  ctx.globalAlpha = 0.08;
  ctx.font = '28px serif';
  ctx.fillStyle = t.accent;
  const hlist = t.hearts;
  for (let i=0; i<40; i++) {
    const hx = (i*137)%W, hy = (i*97+50)%H;
    ctx.fillText(hlist[i%hlist.length], hx, hy);
  }
  ctx.globalAlpha = 1;

  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  roundRect(ctx, 60, 50, W-120, H-100, 32);
  ctx.fill();

  ctx.fillStyle = t.accent;
  ctx.font = 'italic bold 22px "Playfair Display", Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('Sevgili ' + to + ',', W/2, 130);

  ctx.strokeStyle = t.accent;
  ctx.globalAlpha = 0.3;
  ctx.beginPath(); ctx.moveTo(W/2-100, 148); ctx.lineTo(W/2+100, 148); ctx.lineWidth=1; ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.fillStyle = t.text;
  ctx.font = 'italic 20px "Playfair Display", Georgia, serif';
  ctx.textAlign = 'center';
  const lines = wrapText(ctx, msg, W/2, 185, W-200, 34);

  const msgBottom = 185 + lines * 34 + 30;

  ctx.fillStyle = t.accent;
  ctx.globalAlpha = 0.3;
  ctx.beginPath(); ctx.moveTo(W/2-80, msgBottom); ctx.lineTo(W/2+80, msgBottom); ctx.lineWidth=1; ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.fillStyle = t.sub;
  ctx.font = '400 16px "Lato", sans-serif';
  ctx.textAlign = 'center';
  const imzaAdi = from || 'bir kalp';
  ctx.fillText('Seni çok seven ' + imzaAdi + ' ' + t.emoji, W/2, msgBottom + 36);

  ctx.font = '20px serif';
  ctx.fillStyle = t.accent;
  ctx.globalAlpha = 0.6;
  ctx.fillText('♡', W/2 - 30, msgBottom + 72);
  ctx.fillText(t.emoji, W/2, msgBottom + 72);
  ctx.fillText('♡', W/2 + 30, msgBottom + 72);
  ctx.globalAlpha = 1;

  document.getElementById('canvasWrap').style.display = 'block';
  document.getElementById('dlBtn').style.display = 'block';
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x, y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function download() {
  const to = document.getElementById('toName').value.trim() || 'sevgilim';
  const canvas = document.getElementById('msgCanvas');
  const link = document.createElement('a');
  link.download = 'mesaj-' + to.toLowerCase().replace(/\s+/g,'-') + '.jpg';
  link.href = canvas.toDataURL('image/jpeg', 0.95);
  link.click();
}
</script>
