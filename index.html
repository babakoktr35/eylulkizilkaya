
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  .wrap{background:linear-gradient(135deg,#e8006a,#c2185b,#d81b60,#ad1457);min-height:100vh;padding:36px 20px;font-family:'Nunito',sans-serif;position:relative;overflow:hidden;}
  .hearts-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
  .card{background:rgba(255,255,255,0.92);border-radius:28px;border:2px solid rgba(255,150,190,0.4);padding:28px 24px;max-width:560px;margin:0 auto 20px;position:relative;z-index:1;}
  .site-title{font-family:'Pacifico',cursive;font-size:30px;color:#fff;text-align:center;margin-bottom:4px;text-shadow:2px 3px 0px rgba(0,0,0,0.15);}
  .site-sub{font-size:13px;color:rgba(255,255,255,0.85);text-align:center;margin-bottom:24px;font-weight:400;}
  .slabel{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#d81b60;margin-bottom:7px;display:block;font-weight:700;}
  input[type=text],textarea{width:100%;background:rgba(255,230,242,0.6);border:1.5px solid rgba(216,27,96,0.25);border-radius:14px;padding:12px 16px;font-family:'Nunito',sans-serif;font-size:14px;color:#880e4f;outline:none;transition:.2s;resize:none;margin-bottom:16px;}
  input:focus,textarea:focus{border-color:#d81b60;background:#fff0f7;box-shadow:0 0 0 3px rgba(216,27,96,0.1);}
  input::placeholder,textarea::placeholder{color:rgba(194,24,91,0.4);}
  .theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
  .tbtn{padding:11px 6px;border-radius:14px;border:2px solid rgba(216,27,96,0.2);background:rgba(255,230,242,0.5);cursor:pointer;text-align:center;font-size:11px;color:#c2185b;font-family:'Nunito',sans-serif;font-weight:700;transition:.2s;line-height:1.3;}
  .tbtn .em{font-size:20px;display:block;margin-bottom:3px;}
  .tbtn:hover,.tbtn.active{border-color:transparent;color:#fff;transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,0.2);}
  .tbtn[data-t=romantic].active,.tbtn[data-t=romantic]:hover{background:linear-gradient(135deg,#e91e8c,#c2185b);}
  .tbtn[data-t=sweet].active,.tbtn[data-t=sweet]:hover{background:linear-gradient(135deg,#f48fb1,#e91e8c);}
  .tbtn[data-t=magic].active,.tbtn[data-t=magic]:hover{background:linear-gradient(135deg,#9c27b0,#673ab7);}
  .tbtn[data-t=deep].active,.tbtn[data-t=deep]:hover{background:linear-gradient(135deg,#1a1a2e,#16213e);}
  .tbtn[data-t=light].active,.tbtn[data-t=light]:hover{background:linear-gradient(135deg,#29b6f6,#1976d2);}
  .tbtn[data-t=fire].active,.tbtn[data-t=fire]:hover{background:linear-gradient(135deg,#ff5722,#e64a19);}
  .go-btn{width:100%;padding:16px;border:none;border-radius:18px;color:#fff;font-family:'Pacifico',cursive;font-size:18px;cursor:pointer;letter-spacing:.5px;background:linear-gradient(135deg,#e91e8c,#c2185b);box-shadow:0 4px 18px rgba(233,30,140,0.4);transition:.2s;}
  .go-btn:hover{transform:translateY(-2px);box-shadow:0 7px 24px rgba(233,30,140,0.5);}
  #dlBtn{display:none;width:100%;padding:14px;background:linear-gradient(135deg,#43a047,#2e7d32);border:none;border-radius:16px;color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;box-shadow:0 4px 14px rgba(46,125,50,0.3);}
  #dlBtn:hover{opacity:.92;}
  #canvasWrap{display:none;margin-top:16px;border-radius:18px;overflow:hidden;border:2px solid rgba(216,27,96,0.3);}
  #canvasWrap canvas{width:100%;display:block;}
  .music-bar{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.18);border-radius:50px;padding:8px 16px;max-width:560px;margin:0 auto 20px;position:relative;z-index:1;}
  .music-icon{font-size:18px;animation:spin 3s linear infinite;}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .music-info{flex:1;}
  .music-title{font-size:13px;font-weight:700;color:#fff;font-family:'Nunito',sans-serif;}
  .music-artist{font-size:11px;color:rgba(255,255,255,0.75);font-family:'Nunito',sans-serif;}
  .mute-btn{background:rgba(255,255,255,0.25);border:none;border-radius:50%;width:32px;height:32px;color:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
  .mute-btn:hover{background:rgba(255,255,255,0.4);}
</style>

<div class="wrap">
  <canvas class="hearts-layer" id="heartsCanvas"></canvas>

  <div style="text-align:center;margin-bottom:16px;position:relative;z-index:1;">
    <div style="font-size:32px;margin-bottom:6px;">💌</div>
    <div class="site-title">Ona Mesaj Gönder</div>
    <div class="site-sub">Kalbinden gelenlerle onu gülümsет · JPG olarak indir!</div>
  </div>

  <div class="music-bar">
    <span class="music-icon">🎵</span>
    <div class="music-info">
      <div class="music-title">Başrol Sensin</div>
      <div class="music-artist">Manifest</div>
    </div>
    <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
  </div>

  <div class="card">
    <span class="slabel">Kime?</span>
    <input type="text" id="toName" placeholder="Kız arkadaşının adı..." />

    <span class="slabel">Kimden?</span>
    <input type="text" id="fromName" placeholder="Senin adın..." />

    <span class="slabel">Mesajın</span>
    <textarea id="message" rows="4" placeholder="Kalbinden gelenler... ne hissediyorsan yaz 🌸"></textarea>

    <span class="slabel">Tema</span>
    <div class="theme-grid">
      <button class="tbtn active" data-t="romantic" onclick="selTheme(this,'romantic')"><span class="em">💕</span>Romantik</button>
      <button class="tbtn" data-t="sweet" onclick="selTheme(this,'sweet')"><span class="em">🌸</span>Tatlı</button>
      <button class="tbtn" data-t="magic" onclick="selTheme(this,'magic')"><span class="em">✨</span>Büyülü</button>
      <button class="tbtn" data-t="deep" onclick="selTheme(this,'deep')"><span class="em">🌙</span>Gece</button>
      <button class="tbtn" data-t="light" onclick="selTheme(this,'light')"><span class="em">🦋</span>Bulut</button>
      <button class="tbtn" data-t="fire" onclick="selTheme(this,'fire')"><span class="em">🔥</span>Ateş</button>
    </div>

    <button class="go-btn" onclick="generate()">Görsel Oluştur ♡</button>
    <div id="canvasWrap"><canvas id="msgCanvas"></canvas></div>
    <button id="dlBtn" onclick="download()">⬇ JPG Olarak İndir</button>
  </div>
</div>

<script>
let theme = 'romantic';
let muted = false;

const themes = {
  romantic: {
    bg1:'#ff80ab', bg2:'#f06292', bg3:'#e91e8c',
    cardBg:'rgba(255,255,255,0.88)',
    accent:'#c2185b', text:'#880e4f', sub:'#ad1457',
    border:'rgba(194,24,91,0.3)',
    titleFont:'bold italic 24px Georgia,serif',
    bodyFont:'italic 19px Georgia,serif',
    sigFont:'18px Georgia,serif',
    emoji:'💕', hearts:['♥','♡','💕','💗','❤'],
    decoTop:'— 💕 —', decoBot:'~ con amore ~',
    pattern: drawPatternDots
  },
  sweet: {
    bg1:'#fce4ec', bg2:'#f8bbd0', bg3:'#f48fb1',
    cardBg:'rgba(255,252,254,0.92)',
    accent:'#e91e8c', text:'#880e4f', sub:'#c2185b',
    border:'rgba(233,30,140,0.25)',
    titleFont:'bold 23px "Comic Sans MS",cursive',
    bodyFont:'20px "Comic Sans MS",cursive',
    sigFont:'17px "Comic Sans MS",cursive',
    emoji:'🌸', hearts:['🌸','✿','❀','♡','✾'],
    decoTop:'✿ ✿ ✿', decoBot:'with love & flowers ✿',
    pattern: drawPatternFlowers
  },
  magic: {
    bg1:'#e8eaf6', bg2:'#c5cae9', bg3:'#9fa8da',
    cardBg:'rgba(248,245,255,0.9)',
    accent:'#7c4dff', text:'#311b92', sub:'#4527a0',
    border:'rgba(124,77,255,0.3)',
    titleFont:'bold 22px Georgia,serif',
    bodyFont:'italic 19px Georgia,serif',
    sigFont:'17px Georgia,serif',
    emoji:'✨', hearts:['✦','✧','★','⋆','✨'],
    decoTop:'✦ ✦ ✦', decoBot:'~ under the stars ~',
    pattern: drawPatternStars
  },
  deep: {
    bg1:'#0d0d1a', bg2:'#1a1a2e', bg3:'#16213e',
    cardBg:'rgba(10,10,30,0.85)',
    accent:'#e91e8c', text:'#f8bbd0', sub:'#f48fb1',
    border:'rgba(233,30,140,0.4)',
    titleFont:'bold italic 23px Georgia,serif',
    bodyFont:'italic 18px Georgia,serif',
    sigFont:'16px Georgia,serif',
    emoji:'🌙', hearts:['☽','★','✦','♡','✿'],
    decoTop:'— 🌙 —', decoBot:'~ always & forever ~',
    pattern: drawPatternMoon
  },
  light: {
    bg1:'#e1f5fe', bg2:'#b3e5fc', bg3:'#81d4fa',
    cardBg:'rgba(255,255,255,0.9)',
    accent:'#0288d1', text:'#01579b', sub:'#0277bd',
    border:'rgba(2,136,209,0.25)',
    titleFont:'bold 22px "Trebuchet MS",sans-serif',
    bodyFont:'19px "Trebuchet MS",sans-serif',
    sigFont:'16px "Trebuchet MS",sans-serif',
    emoji:'🦋', hearts:['❋','✿','❀','♡','☁'],
    decoTop:'☁ ☁ ☁', decoBot:'~ light as a feather ~',
    pattern: drawPatternClouds
  },
  fire: {
    bg1:'#fbe9e7', bg2:'#ffccbc', bg3:'#ffab91',
    cardBg:'rgba(255,252,250,0.9)',
    accent:'#d84315', text:'#bf360c', sub:'#e64a19',
    border:'rgba(216,67,21,0.3)',
    titleFont:'bold 23px Impact,sans-serif',
    bodyFont:'18px "Trebuchet MS",sans-serif',
    sigFont:'16px "Trebuchet MS",sans-serif',
    emoji:'🔥', hearts:['❤','♥','✦','★','🔥'],
    decoTop:'— ❤ —', decoBot:'~ burning bright ~',
    pattern: drawPatternFire
  }
};

function drawPatternDots(ctx,W,H){
  ctx.globalAlpha=0.07; ctx.fillStyle='#c2185b';
  for(let x=20;x<W;x+=30) for(let y=20;y<H;y+=30){ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
}
function drawPatternFlowers(ctx,W,H){
  ctx.globalAlpha=0.08; ctx.fillStyle='#e91e8c';
  ctx.font='18px serif';
  for(let i=0;i<30;i++) ctx.fillText(['✿','❀','✾'][i%3],(i*137)%W,(i*89+20)%H);
  ctx.globalAlpha=1;
}
function drawPatternStars(ctx,W,H){
  ctx.globalAlpha=0.1; ctx.fillStyle='#7c4dff';
  for(let i=0;i<40;i++){const x=(i*173)%W,y=(i*103)%H,s=1+Math.random()*2;ctx.beginPath();ctx.arc(x,y,s,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
}
function drawPatternMoon(ctx,W,H){
  ctx.globalAlpha=0.07;
  for(let i=0;i<20;i++){const x=(i*157)%W,y=(i*113)%H;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
}
function drawPatternClouds(ctx,W,H){
  ctx.globalAlpha=0.08; ctx.fillStyle='#0288d1';
  for(let i=0;i<6;i++){const x=(i*140+30)%W,y=(i*90+30)%H;ctx.beginPath();ctx.arc(x,y,18,0,Math.PI*2);ctx.arc(x+20,y-8,14,0,Math.PI*2);ctx.arc(x+38,y,16,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
}
function drawPatternFire(ctx,W,H){
  ctx.globalAlpha=0.07; ctx.fillStyle='#e64a19';
  ctx.font='20px serif';
  for(let i=0;i<20;i++) ctx.fillText('★',(i*163)%W,(i*101+20)%H);
  ctx.globalAlpha=1;
}

function selTheme(btn,t){
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); theme=t;
}

function wrapText(ctx,text,x,y,maxW,lineH){
  const words=text.split(' '); let line='',lines=[];
  for(let w of words){const test=line+w+' ';if(ctx.measureText(test).width>maxW&&line!==''){lines.push(line.trim());line=w+' ';}else line=test;}
  if(line.trim()) lines.push(line.trim());
  lines.forEach((l,i)=>ctx.fillText(l,x,y+i*lineH));
  return lines.length;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function generate(){
  const to=document.getElementById('toName').value.trim();
  const from=document.getElementById('fromName').value.trim();
  const msg=document.getElementById('message').value.trim();
  if(!to||!msg){const el=!to?document.getElementById('toName'):document.getElementById('message');el.style.borderColor='#e91e8c';el.focus();setTimeout(()=>el.style.borderColor='',2000);return;}

  const t=themes[theme];
  const W=800,H=600;
  const canvas=document.getElementById('msgCanvas');
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');

  const grad=ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,t.bg1);grad.addColorStop(0.5,t.bg2);grad.addColorStop(1,t.bg3);
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  t.pattern(ctx,W,H);

  ctx.fillStyle=t.cardBg;
  roundRect(ctx,50,40,W-100,H-80,36);ctx.fill();
  ctx.strokeStyle=t.border;ctx.lineWidth=1.5;
  roundRect(ctx,50,40,W-100,H-80,36);ctx.stroke();

  ctx.fillStyle=t.accent;
  ctx.font='bold 15px "Nunito",sans-serif';
  ctx.textAlign='center';
  ctx.fillText(t.decoTop,W/2,90);

  ctx.font=t.titleFont;
  ctx.fillStyle=t.accent;
  ctx.fillText('Sevgili '+to+',',W/2,130);

  ctx.strokeStyle=t.accent;ctx.globalAlpha=0.25;
  ctx.beginPath();ctx.moveTo(W/2-120,148);ctx.lineTo(W/2+120,148);ctx.lineWidth=1;ctx.stroke();
  ctx.globalAlpha=1;

  ctx.font=t.bodyFont;ctx.fillStyle=t.text;
  const lines=wrapText(ctx,msg,W/2,188,W-180,35);
  const msgBottom=188+lines*35+24;

  ctx.strokeStyle=t.accent;ctx.globalAlpha=0.25;
  ctx.beginPath();ctx.moveTo(W/2-90,msgBottom);ctx.lineTo(W/2+90,msgBottom);ctx.lineWidth=1;ctx.stroke();
  ctx.globalAlpha=1;

  ctx.font=t.sigFont;ctx.fillStyle=t.sub;
  ctx.fillText('Seni çok seven '+(from||'bir kalp')+' '+t.emoji,W/2,msgBottom+36);

  ctx.font='14px "Nunito",sans-serif';ctx.fillStyle=t.sub;ctx.globalAlpha=0.6;
  ctx.fillText(t.decoBot,W/2,msgBottom+64);ctx.globalAlpha=1;

  document.getElementById('canvasWrap').style.display='block';
  document.getElementById('dlBtn').style.display='block';
}

function download(){
  const to=document.getElementById('toName').value.trim()||'sevgilim';
  const canvas=document.getElementById('msgCanvas');
  const link=document.createElement('a');
  link.download='mesaj-'+to.toLowerCase().replace(/\s+/g,'-')+'.jpg';
  link.href=canvas.toDataURL('image/jpeg',0.95);link.click();
}

// Floating hearts canvas
function initHearts(){
  const canvas=document.getElementById('heartsCanvas');
  const wrap=document.querySelector('.wrap');
  canvas.width=wrap.offsetWidth||600;
  canvas.height=Math.max(wrap.scrollHeight,800);
  const ctx=canvas.getContext('2d');
  const hearts=[];
  const symbols=['♥','♡','💕','💗','❤','✿','♡'];
  for(let i=0;i<35;i++) hearts.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:10+Math.random()*16,
    speed:0.4+Math.random()*0.8,
    drift:(Math.random()-.5)*0.4,
    sym:symbols[Math.floor(Math.random()*symbols.length)],
    opacity:0.08+Math.random()*0.18,
    angle:Math.random()*Math.PI*2
  });
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    hearts.forEach(h=>{
      ctx.save();ctx.globalAlpha=h.opacity;
      ctx.fillStyle='#fff';
      ctx.font=h.size+'px serif';
      ctx.textAlign='center';
      ctx.translate(h.x,h.y);ctx.rotate(Math.sin(h.angle)*0.2);
      ctx.fillText(h.sym,0,0);
      ctx.restore();
      h.y-=h.speed;h.x+=h.drift;h.angle+=0.02;
      if(h.y<-30){h.y=canvas.height+30;h.x=Math.random()*canvas.width;}
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// Music via YouTube iframe API
function loadMusic(){
  if(document.getElementById('ytIframe')) return;
  const tag=document.createElement('script');
  tag.src='https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}
let ytPlayer=null;
window.onYouTubeIframeAPIReady=function(){
  const div=document.createElement('div');
  div.id='ytIframe';div.style.display='none';
  document.body.appendChild(div);
  ytPlayer=new YT.Player('ytIframe',{
    videoId:'yd9e3Lqf2Eg',
    playerVars:{autoplay:1,loop:1,playlist:'yd9e3Lqf2Eg',controls:0,mute:0},
    events:{onReady:e=>e.target.playVideo()}
  });
};
function toggleMute(){
  const btn=document.getElementById('muteBtn');
  if(!ytPlayer) return;
  if(muted){ytPlayer.unMute();btn.textContent='🔊';muted=false;}
  else{ytPlayer.mute();btn.textContent='🔇';muted=true;}
}

initHearts();
loadMusic();
</script>
